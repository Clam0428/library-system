<div id="fragmentReaderBooks" class="fade-in" style="min-height: calc(100vh - 80px);">
    <div class="container-fluid py-4 px-lg-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="font-weight-bold mb-1" style="color: #1e293b;">图书查询</h3>
                <p class="text-muted small mb-0">探索馆藏资源并提交借阅申请</p>
            </div>
        </div>

        <div id="overdueAlert" class="alert alert-danger border-0 shadow-sm mb-4" style="display:none; border-radius: 14px;">
            <div class="d-flex align-items-start">
                <i class="fas fa-exclamation-triangle mr-2 mt-1"></i>
                <div><strong>逾期限制：</strong> 您有逾期未还的书籍，借阅功能已受限。请先归还并结算罚金。</div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-4" style="border-radius: 16px; overflow: hidden;">
            <div class="card-header bg-white py-3 border-0">
                <div class="row align-items-center">
                    <div class="col-lg-6 mb-3 mb-lg-0">
                        <div class="text-muted small">支持按书名 / 作者搜索</div>
                    </div>
                    <div class="col-lg-6">
                        <form id="bookSearchForm" class="d-flex justify-content-lg-end align-items-center">
                            <div class="search-box mr-2">
                                <i class="fas fa-search"></i>
                                <input type="text" id="searchKeyword" class="form-control" placeholder="搜书名 / 作者...">
                            </div>
                            <select id="searchType" class="form-control mr-2" style="width: 180px; border-radius: 10px; background: #f1f5f9; border: none; font-size: 14px; height: 38px;">
                                <option value="">所有分类</option>
                            </select>
                            <button type="submit" class="btn btn-dark px-3" style="border-radius: 10px;">筛选</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" id="booksGrid"></div>

        <div id="loadingIndicator" class="text-center py-4" style="display:none">
            <div class="spinner-border text-primary" role="status">
                <span class="sr-only">加载中...</span>
            </div>
        </div>
        <div id="noMoreData" class="text-center py-4 text-muted" style="display:none">
            没有更多书籍了
        </div>

    <!-- 图书详情模态框 -->
    <div class="modal fade" id="bookDetailModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 28px; overflow: hidden;">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="modal-title"><i class="fas fa-book mr-2"></i>图书详情</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body p-4" id="bookDetailBody">
                    <!-- 动态加载内容 -->
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-dismiss="modal">关闭</button>
                    <div id="modalActionBtn"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 借阅申请表单模态框 -->
    <div class="modal fade" id="borrowApplyModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 28px; overflow: hidden;">
                <div class="modal-header bg-success text-white border-0">
                    <h5 class="modal-title"><i class="fas fa-file-signature mr-2"></i>填写借阅申请</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body p-4">
                    <form id="borrowApplyForm">
                        <input type="hidden" id="applyBookId">
                        <div class="row mb-4">
                            <div class="col-12">
                                <h6 class="text-primary border-bottom pb-2 mb-3"><i class="fas fa-user-circle mr-2"></i>借阅人信息</h6>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="small text-muted">姓名</label>
                                <input type="text" id="applyReaderName" class="form-control-plaintext font-weight-bold" readonly>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="small text-muted">学号</label>
                                <input type="text" id="applyReaderNumber" class="form-control-plaintext font-weight-bold" readonly>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="small text-muted">性别</label>
                                <input type="text" id="applyReaderSex" class="form-control-plaintext font-weight-bold" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="small text-muted">所属院系</label>
                                <input type="text" id="applyReaderDept" class="form-control-plaintext font-weight-bold" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="small text-muted">联系电话</label>
                                <input type="text" id="applyReaderTel" class="form-control-plaintext font-weight-bold" readonly>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-12">
                                <h6 class="text-primary border-bottom pb-2 mb-3"><i class="fas fa-calendar-alt mr-2"></i>时间安排</h6>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="small text-muted font-weight-bold">预计取书时间</label>
                                <input type="date" id="applyLendDate" class="form-control" required>
                                <small class="text-info"><i class="fas fa-info-circle mr-1"></i>取书时间不能早于今日</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="small text-muted font-weight-bold">预计归还时间</label>
                                <input type="date" id="applyBackDate" class="form-control" readonly style="background-color: #f8f9fa;">
                                <small class="text-muted"><i class="fas fa-lock mr-1"></i>自动计算（取书后7天），不可编辑</small>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-12">
                                <div class="p-3 bg-light rounded border-left border-warning">
                                    <div class="d-flex align-items-center">
                                        <i class="fas fa-book-reader fa-2x text-warning mr-3"></i>
                                        <div>
                                            <div class="font-weight-bold">借阅书籍</div>
                                            <div id="applyBookName" class="text-secondary"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success px-4" id="submitApplyBtn">提交借阅申请</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(function(){
            // 初始化分类下拉框
            $.get('/api/type/listAll').done(function(resp){
                if(resp && resp.code === 0 && resp.data){
                    var options = resp.data.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
                    $('#searchType').append(options);
                }
            });

            var currentPage = 1;
            var pageSize = 16; // 增加每页数量，确保在大屏幕下也能触发滚动
            var hasOverdue = false;
            var isLoading = false;
            var hasMore = true;

            function checkOverdueStatus(){
                $.get('/api/reader/currentUser').done(function(userResp){
                    if(!userResp || userResp.code !== 0 || !userResp.data) return;
                    var readerId = userResp.data.id;
                    $.get('/api/lend/listByReader/' + readerId).done(function(resp){
                        if(resp && resp.code === 0 && resp.data){
                            hasOverdue = resp.data.some(l => {
                                var s = l.status !== undefined ? l.status : l.backType;
                                return s === 4;
                            });
                            if(hasOverdue){
                                $('#overdueAlert').show();
                                $('.borrow-btn').prop('disabled', true).addClass('btn-outline-secondary').removeClass('btn-outline-primary').text('已受限');
                            }
                        }
                    });
                });
            }

            function loadBooks(page, append = false){
                if(isLoading) return;
                isLoading = true;
                currentPage = page || 1;
                
                if(!append) {
                    $('#booksGrid').empty();
                    $('#noMoreData').hide();
                    hasMore = true;
                }
                
                $('#loadingIndicator').show();

                var keyword = $('#searchKeyword').val();
                var typeId = $('#searchType').val();
                
                var url = '/api/book/list?page=' + currentPage + '&limit=' + pageSize;
                if(keyword) url = '/api/book/search?keyword=' + encodeURIComponent(keyword) + '&page=' + currentPage + '&limit=' + pageSize;
                else if(typeId) url = '/api/book/listByType/' + typeId + '?page=' + currentPage + '&limit=' + pageSize;

                $.get(url).done(function(resp){
                    if(resp && resp.code === 0 && resp.data){
                        renderBooks(resp.data, append);
                        checkOverdueStatus();
                        
                        if(resp.data.length < pageSize){
                            hasMore = false;
                            if(currentPage > 1 || resp.data.length > 0) $('#noMoreData').show();
                        } else {
                            // 如果加载完数据后仍未出现滚动条且还有更多数据，自动加载下一页
                            setTimeout(function() {
                                if (hasMore && !isLoading && $(window).height() >= $(document).height()) {
                                    loadBooks(currentPage + 1, true);
                                }
                            }, 500);
                        }
                    }
                    isLoading = false;
                    $('#loadingIndicator').hide();
                }).fail(function(){
                    isLoading = false;
                    $('#loadingIndicator').hide();
                });
            }

            function renderBooks(books, append){
                if(!append && (!books || books.length === 0)){
                    $('#booksGrid').html('<div class="col-12 text-center text-muted py-5">没有找到匹配的图书</div>');
                    return;
                }
                
                var html = books.map(book => {
                    var statusBadge = book.status === 0 ? 
                        '<span class="badge badge-success">可借阅</span>' : 
                        (book.status === 1 ? '<span class="badge badge-warning">已借出</span>' : '<span class="badge badge-danger">不可用</span>');
                    
                    var auditBadge = book.isReviewRequired === 1 ? 
                        '<span class="badge badge-info ml-1" title="借阅此书需要管理员手动审核"><i class="fas fa-user-check"></i> 需审核</span>' : '';
                    
                    var available = book.stock - (book.borrowCount || 0);

                    return `
                        <div class="col-md-3 mb-4">
                            <div class="card h-100 border-0 shadow-sm book-card" data-id="${book.id}" style="cursor:pointer">
                                <div class="card-body">
                                    <div class="mb-2">${statusBadge}${auditBadge}</div>
                                    <h6 class="card-title text-dark font-weight-bold text-truncate" title="${book.name}">${book.name}</h6>
                                    <p class="card-text small text-muted mb-1"><i class="fas fa-user-edit mr-1"></i> ${book.author || '未知作者'}</p>
                                    <p class="card-text small text-muted mb-1"><i class="fas fa-map-marker-alt mr-1"></i> ${book.location || '-'}</p>
                                    <div class="mt-3 d-flex justify-content-between align-items-center">
                                        <span class="small text-muted">库存: <b class="text-primary">${available}</b></span>
                                        <i class="fas fa-chevron-right text-light"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                if(append) $('#booksGrid').append(html);
                else $('#booksGrid').html(html);
            }

            // 无限滚动逻辑 - 使用防抖处理和更严谨的触发条件
            $(window).off('scroll.infinite').on('scroll.infinite', function() {
                if (isLoading || !hasMore) return;
                
                var scrollTop = $(window).scrollTop();
                var windowHeight = $(window).height();
                var documentHeight = $(document).height();
                
                // 距离底部 200 像素时触发
                if (scrollTop + windowHeight > documentHeight - 200) {
                    loadBooks(currentPage + 1, true);
                }
            });

            // 点击展示详情
            $(document).on('click', '.book-card', function(){
                var bookId = $(this).data('id');
                $.get('/api/book/' + bookId).done(function(resp){
                    if(resp && resp.code === 0 && resp.data){
                        var book = resp.data;
                        // 将书籍数据挂载到全局或模态框上，方便后续借阅逻辑读取
                        $('#bookDetailModal').data('current-book', book);
                        
                        var available = book.stock - (book.borrowCount || 0);
                        var statusText = book.status === 0 ? '可借阅' : (book.status === 1 ? '已借出' : '不可用');
                        var statusClass = book.status === 0 ? 'text-success' : (book.status === 1 ? 'text-warning' : 'text-danger');
                        
                        var publishDate = book.publishDate ? new Date(book.publishDate).toLocaleDateString() : '-';
                        var price = book.price ? '￥' + book.price : '-';
                        
                        var html = `
                            <div class="book-detail-modern">
                                <div class="row mb-4">
                                    <div class="col-12">
                                        <h6 class="text-primary border-bottom pb-2 mb-3"><i class="fas fa-info-circle mr-2"></i>基本信息</h6>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="small text-muted">书名</label>
                                        <div class="font-weight-bold text-dark h5">${book.name}</div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="small text-muted">作者</label>
                                        <div class="font-weight-bold text-dark">${book.author || '-'}</div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="small text-muted">图书分类</label>
                                        <div class="text-secondary">${book.typeName || '-'}</div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="small text-muted">馆藏位置</label>
                                        <div class="text-secondary">${book.location || '-'}</div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="small text-muted">语言</label>
                                        <div class="text-secondary">${book.language || '-'}</div>
                                    </div>
                                </div>

                                <div class="row mb-4">
                                    <div class="col-12">
                                        <h6 class="text-primary border-bottom pb-2 mb-3"><i class="fas fa-print mr-2"></i>出版与库存</h6>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="small text-muted">出版社</label>
                                        <div class="text-secondary">${book.publish || '-'}</div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="small text-muted">出版日期</label>
                                        <div class="text-secondary">${publishDate}</div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="small text-muted">书籍价格</label>
                                        <div class="text-danger font-weight-bold">${price}</div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="small text-muted">当前状态</label>
                                        <div><span class="badge badge-pill ${book.status === 0 ? 'badge-success' : (book.status === 1 ? 'badge-warning' : 'badge-danger')}">${statusText}</span></div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="small text-muted">可用库存</label>
                                        <div class="font-weight-bold">${available} <small class="text-muted">/ ${book.stock}</small></div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="small text-muted">审核要求</label>
                                        <div class="${book.isReviewRequired === 1 ? 'text-info' : 'text-muted'}">${book.isReviewRequired === 1 ? '<i class="fas fa-user-check mr-1"></i>需管理员审核' : '无需审核'}</div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-12">
                                        <h6 class="text-primary border-bottom pb-2 mb-3"><i class="fas fa-align-left mr-2"></i>内容简介</h6>
                                        <div class="p-3 bg-light rounded text-secondary shadow-sm" style="line-height: 1.8; min-height: 80px;">
                                            ${book.introduction || '<span class="text-muted italic">暂无详细简介</span>'}
                                        </div>
                                    </div>
                                    ${book.remark ? `
                                    <div class="col-12 mt-3">
                                        <label class="small text-muted">备注说明</label>
                                        <div class="small text-muted alert alert-secondary py-2 border-0 mb-0">${book.remark}</div>
                                    </div>` : ''}
                                </div>
                            </div>
                        `;
                        $('#bookDetailBody').html(html);
                        
                        var actionBtn = '';
                        if(book.status === 0 && available > 0){
                            if(hasOverdue){
                                actionBtn = `<button class="btn btn-secondary" disabled>逾期受限</button>`;
                            } else {
                                actionBtn = `<button class="btn btn-primary borrow-confirm-btn" data-id="${book.id}" data-name="${book.name}">立即申请借阅</button>`;
                            }
                        } else {
                            actionBtn = `<button class="btn btn-secondary" disabled>暂不可借</button>`;
                        }
                        $('#modalActionBtn').html(actionBtn);
                        $('#bookDetailModal').modal('show');
                    }
                });
            });

            $('#bookSearchForm').submit(function(e){
                e.preventDefault();
                loadBooks(1, false);
            });

            // 点击借阅按钮 - 打开申请表单
            $(document).on('click', '.borrow-confirm-btn', function(){
                var bookId = $(this).data('id');
                var bookName = $(this).data('name');
                var book = $('#bookDetailModal').data('current-book');
                
                if(!book) {
                    window.ui.toast('数据加载异常，请刷新重试', 'danger');
                    return;
                }
                
                // 获取当前用户信息并填充表单
                $.get('/api/reader/currentUser').done(function(userResp){
                    if(userResp && userResp.code === 0 && userResp.data){
                        var user = userResp.data;
                        $('#applyReaderName').val(user.realName || '-');
                        $('#applyReaderNumber').val(user.readerNumber || '-');
                        var sexText = user.sex === 2 ? '女' : '男';
                        $('#applyReaderSex').val(sexText);
                        $('#applyReaderDept').val(user.department || '-');
                        $('#applyReaderTel').val(user.tel || '-');
                        
                        $('#applyBookId').val(bookId);
                        $('#applyBookName').text('《' + bookName + '》');
                        
                        // 设置默认时间逻辑
                        var today = new Date();
                        var todayStr = today.toISOString().split('T')[0];
                        
                        // 修正逻辑：预计归还时间从申请当天（今天）开始计算 + 7天
                        var backDate = new Date(today);
                        backDate.setDate(backDate.getDate() + 7);
                        var backDateStr = backDate.toISOString().split('T')[0];
                        $('#applyBackDate').val(backDateStr);

                        // 设置预计取书时间的范围：不得早于今日且不得晚于预计归还时间
                        $('#applyLendDate').val(todayStr);
                        $('#applyLendDate').attr('min', todayStr);
                        $('#applyLendDate').attr('max', backDateStr);
                        
                        // 存储书籍是否需要审核的信息，用于提交后的提示
                        // 注意：这里需要从 API 返回的 book 对象中读取，闭包会保留对该对象的引用
                        $('#borrowApplyForm').data('needs-review', book.isReviewRequired === 1);
                        
                        $('#bookDetailModal').modal('hide');
                        $('#borrowApplyModal').modal('show');
                    } else {
                        window.ui.toast('获取用户信息失败，请重新登录', 'danger');
                    }
                });
            });

            // 限制预计取书时间的变化，确保在合理范围内
             $('#applyLendDate').on('change', function(){
                 var selectedDate = new Date($(this).val());
                 var today = new Date();
                 today.setHours(0,0,0,0);
                 var backDate = new Date($('#applyBackDate').val());
                 backDate.setHours(0,0,0,0);
                 
                 if(selectedDate < today){
                     window.ui.toast('取书时间不能早于今天', 'warning');
                     $(this).val(today.toISOString().split('T')[0]);
                 } else if (selectedDate > backDate) {
                     window.ui.toast('取书时间不能晚于预计归还时间', 'warning');
                     $(this).val(backDate.toISOString().split('T')[0]);
                 }
             });

            // 提交申请
            $('#submitApplyBtn').on('click', function(){
                var $btn = $(this);
                if($btn.prop('disabled')) return; // 防止重复点击

                var bookId = $('#applyBookId').val();
                var lendDate = $('#applyLendDate').val();
                var backDate = $('#applyBackDate').val();
                var needsReview = $('#borrowApplyForm').data('needs-review');
                
                if(!lendDate){
                    window.ui.toast('请选择取书时间', 'warning');
                    return;
                }

                $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 提交中...');

                $.get('/api/reader/currentUser').done(function(userResp){
                    if(userResp && userResp.code === 0 && userResp.data){
                        $.post('/api/lend/borrow', { 
                            readerId: userResp.data.id,
                            bookId: bookId,
                            lendDate: lendDate,
                            shouldBackDate: backDate
                        }).done(function(resp){
                            if(resp && resp.code === 0){
                            if(needsReview) {
                                window.ui.toast('借阅申请已提交，请等待管理员审核', 'success');
                            } else {
                                window.ui.toast('借阅成功，请按预约时间前往取书', 'success');
                            }
                            $('#borrowApplyModal').modal('hide');
                            // 强制清除缓存后刷新页面数据
                            if(typeof loadBooks === 'function') {
                                loadBooks(1, false);
                            } else {
                                window.location.reload();
                            }
                        } else {
                                window.ui.toast('申请失败: ' + ((resp.message || resp.msg) || '未知错误'), 'danger');
                            }
                        }).always(function(){
                            $btn.prop('disabled', false).html('提交申请');
                        });
                    } else {
                        $btn.prop('disabled', false).html('提交申请');
                        window.ui.toast('获取用户信息失败，请重新登录', 'danger');
                    }
                }).fail(function(){
                    $btn.prop('disabled', false).html('提交申请');
                    window.ui.toast('网络请求失败，请检查网络连接', 'danger');
                });
            });

            loadBooks(1);
        });
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-box { position: relative; width: 320px; max-width: 52vw; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .search-box .form-control {
