<div id="fragmentAnnouncements" class="fade-in" style="min-height: calc(100vh - 80px);">
    <div class="container-fluid py-4 px-lg-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="font-weight-bold mb-1" style="color: #1e293b;">发布公告</h3>
                <p class="text-muted small mb-0">将公告发送到所有读者的消息中心</p>
            </div>
            <div class="d-flex align-items-center">
                <button id="btnSendAnnouncement" class="btn btn-primary px-4 shadow-sm" style="border-radius: 10px;">
                    <i class="fas fa-paper-plane mr-2"></i>发布并发送
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-xl-6 mb-4">
                <div class="card border-0 shadow-sm" style="border-radius: 16px; overflow: hidden;">
                    <div class="card-header bg-white py-3 border-0">
                        <div class="font-weight-bold">公告内容</div>
                    </div>
                    <div class="card-body p-4">
                        <div class="form-group">
                            <label class="font-weight-bold small text-muted mb-2">标题</label>
                            <input id="annTitle" class="form-control" style="border-radius: 12px; height: 44px;" placeholder="请输入公告标题">
                        </div>
                        <div class="form-group mb-0">
                            <label class="font-weight-bold small text-muted mb-2">内容</label>
                            <textarea id="annContent" class="form-control" rows="10" style="border-radius: 12px;" placeholder="请输入公告内容..."></textarea>
                        </div>
                        <div id="annMsg" class="mt-3 text-muted small" style="display:none;"></div>
                    </div>
                </div>
            </div>

            <div class="col-xl-6 mb-4">
                <div class="card border-0 shadow-sm" style="border-radius: 16px; overflow: hidden;">
                    <div class="card-header bg-white py-3 border-0">
                        <div class="font-weight-bold">预览</div>
                    </div>
                    <div class="card-body p-4">
                        <div class="p-4" style="border-radius: 14px; background: #f8fafc; border: 1px solid #eef2f7;">
                            <div class="d-flex align-items-center mb-2">
                                <div class="mr-2" style="width:10px;height:10px;border-radius:999px;background:#6366f1;"></div>
                                <div class="font-weight-bold" id="annPreviewTitle" style="color:#0f172a;">（标题预览）</div>
                            </div>
                            <div class="text-muted small mb-3">发送到所有读者消息中心</div>
                            <div id="annPreviewContent" style="white-space: pre-wrap; color:#334155;">（内容预览）</div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm mt-4" style="border-radius: 16px; overflow: hidden;">
                    <div class="card-header bg-white py-3 border-0 d-flex align-items-center justify-content-between">
                        <div class="font-weight-bold">最近公告</div>
                        <button type="button" class="btn btn-link text-muted p-0" id="btnRefreshNotices">刷新</button>
                    </div>
                    <div class="table-responsive" style="max-height: 340px;">
                        <table class="table custom-table mb-0" id="noticeTable">
                            <thead>
                                <tr>
                                    <th class="pl-4">标题</th>
                                    <th style="width:140px;">发布时间</th>
                                    <th class="text-right pr-4" style="width:80px;">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="3" class="text-center py-5 text-muted">正在加载...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="drawer-overlay" id="noticeDrawerOverlay"></div>
    <div class="drawer shadow-lg" id="noticeDrawer">
        <div class="drawer-header">
            <span>公告详情</span>
            <button class="close-drawer" id="closeNoticeDrawer"><i class="fas fa-times"></i></button>
        </div>
        <div class="drawer-body p-4">
            <div class="detail-section">
                <div class="detail-item" style="display:block;">
                    <div class="text-muted small mb-2">标题</div>
                    <div class="font-weight-bold" id="ndTitle" style="color:#0f172a; font-size: 18px;">-</div>
                </div>
            </div>
            <div class="detail-section mt-4">
                <div class="detail-item" style="display:block;">
                    <div class="text-muted small mb-2">发布时间</div>
                    <div id="ndTime" style="color:#334155;">-</div>
                </div>
            </div>
            <div class="detail-section mt-4">
                <div class="detail-item" style="display:block;">
                    <div class="text-muted small mb-2">内容</div>
                    <div id="ndContent" style="white-space: pre-wrap; color:#334155;">-</div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .custom-table thead th {
            background: #f8fafc; border-bottom: 1px solid #e2e8f0; color: #475569;
            font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 16px;
        }
        .custom-table tbody td { padding: 16px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; color: #334155; }
        .custom-table tbody tr:hover { background: #fcfdfe; }

        .action-btn {
            width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center;
            justify-content: center; color: #64748b; transition: all 0.2s;
        }
        .action-btn:hover { background: #f1f5f9; color: #1e293b; text-decoration: none; }

        body.drawer-open { overflow: hidden; }
        .drawer-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(2px);
            z-index: 1070;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease-out;
        }
        .drawer-overlay.show { opacity: 1; pointer-events: auto; }
        .drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 460px;
            max-width: 92vw;
            height: 100%;
            background: #fff;
            z-index: 1080;
            transform: translateX(110%);
            transition: transform 0.28s cubic-bezier(0.2, 0.9, 0.2, 1);
            border-top-left-radius: 18px;
            border-bottom-left-radius: 18px;
            overflow: hidden;
        }
        .drawer.open { transform: translateX(0); }
        .drawer-header {
            padding: 18px 20px;
            border-bottom: 1px solid #eef2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            font-size: 16px;
            color: #0f172a;
            background: linear-gradient(180deg, rgba(99,102,241,0.10) 0%, rgba(255,255,255,1) 100%);
        }
        .close-drawer { border: none; background: none; font-size: 20px; color: #94a3b8; cursor: pointer; }
        .detail-section h6 {
            font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 16px; border-left: 3px solid #3b82f6; padding-left: 10px;
        }
        .detail-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .detail-item span { color: #64748b; }
    </style>

    <script>
        (function(){
            var $msg = $('#annMsg');
            var $title = $('#annTitle');
            var $content = $('#annContent');

            function showMsg(text, isError){
                $msg.text(text).css('color', isError ? '#c00' : '#64748b').show();
                setTimeout(function(){ $msg.fadeOut(); }, 4000);
            }

            function renderPreview(){
                var t = ($title.val() || '').trim();
                var c = ($content.val() || '').trim();
                $('#annPreviewTitle').text(t || '（标题预览）');
                $('#annPreviewContent').text(c || '（内容预览）');
            }

            function formatTime(v){
                if(!v) return '-';
                var d = new Date(v);
                if(isNaN(d.getTime())) return '-';
                var y = d.getFullYear();
                var m = String(d.getMonth()+1).padStart(2,'0');
                var da = String(d.getDate()).padStart(2,'0');
                var hh = String(d.getHours()).padStart(2,'0');
                var mm = String(d.getMinutes()).padStart(2,'0');
                return y + '-' + m + '-' + da + ' ' + hh + ':' + mm;
            }

            function loadNotices(){
                $('#noticeTable tbody').html('<tr><td colspan="3" class="text-center py-5 text-muted">正在加载...</td></tr>');
                $.get('/api/notice/list', {page: 1, limit: 10}).done(function(resp){
                    if(!resp || resp.code !== 0){
                        $('#noticeTable tbody').html('<tr><td colspan="3" class="text-center py-5 text-muted">加载失败</td></tr>');
                        return;
                    }
                    var rows = resp.data || [];
                    if(rows.length === 0){
                        $('#noticeTable tbody').html('<tr><td colspan="3" class="text-center py-5 text-muted">暂无公告</td></tr>');
                        return;
                    }
                    var html = '';
                    rows.forEach(function(n){
                        html += ''+
                            '<tr data-id="'+(n.id||'')+'">'+
                                '<td class="pl-4" style="max-width: 320px;">'+(n.title||'')+'</td>'+
                                '<td>'+formatTime(n.createTime)+'</td>'+
                                '<td class="text-right pr-4">'+
                                    '<div class="dropdown">'+
                                        '<a class="action-btn" href="#" data-toggle="dropdown"><i class="fas fa-ellipsis-h"></i></a>'+
                                        '<div class="dropdown-menu dropdown-menu-right border-0 shadow-lg py-2" style="border-radius: 12px;">'+
                                            '<button class="dropdown-item py-2 btn-notice-detail" data-id="'+(n.id||'')+'"><i class="far fa-list-alt mr-2"></i>详情</button>'+
                                        '</div>'+
                                    '</div>'+
                                '</td>'+
                            '</tr>';
                    });
                    $('#noticeTable tbody').html(html);
                }).fail(function(){
                    $('#noticeTable tbody').html('<tr><td colspan="3" class="text-center py-5 text-muted">加载失败</td></tr>');
                });
            }

            function openDrawer(){
                $('#noticeDrawerOverlay').addClass('show');
                $('#noticeDrawer').addClass('open');
                document.body.classList.add('drawer-open');
            }

            function closeDrawer(){
                $('#noticeDrawerOverlay').removeClass('show');
                $('#noticeDrawer').removeClass('open');
                document.body.classList.remove('drawer-open');
            }

            function showNoticeDetail(id){
                if(!id) return;
                $.get('/api/notice/' + id).done(function(resp){
                    if(!resp || resp.code !== 0 || !resp.data){
                        showMsg('无法获取公告详情', true);
                        return;
                    }
                    var n = resp.data;
                    $('#ndTitle').text(n.title || '-');
                    $('#ndTime').text(formatTime(n.createTime));
                    $('#ndContent').text(n.content || '-');
                    openDrawer();
                }).fail(function(){
                    showMsg('无法获取公告详情', true);
                });
            }

            function sendAnnouncement(){
                var t = ($title.val() || '').trim();
                var c = ($content.val() || '').trim();
                if(!t){ showMsg('标题不能为空', true); return; }
                if(!c){ showMsg('内容不能为空', true); return; }

                var $btn = $('#btnSendAnnouncement');
                $btn.prop('disabled', true).text('发送中...');
                $.ajax({
                    url: '/api/admin/announcement/send',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({title: t, content: c})
                }).done(function(resp){
                    if(resp && resp.code === 0 && resp.data){
                        showMsg('已发送给 ' + (resp.data.sentCount || 0) + ' 位读者');
                        $title.val('');
                        $content.val('');
                        renderPreview();
                        loadNotices();
                    } else {
                        showMsg((resp && resp.msg) || '发送失败', true);
                    }
                }).fail(function(xhr){
                    var msg = '发送失败';
                    if(xhr && xhr.status === 401) msg = '未登录，请重新登录管理员账号';
                    showMsg(msg, true);
                }).always(function(){
                    $btn.prop('disabled', false).html('<i class="fas fa-paper-plane mr-2"></i>发布并发送');
                });
            }

            $(document).off('input.annPreview').on('input.annPreview', '#annTitle, #annContent', renderPreview);
            $(document).off('click.annSend').on('click.annSend', '#btnSendAnnouncement', function(){ sendAnnouncement(); });
            $(document).off('click.annRefresh').on('click.annRefresh', '#btnRefreshNotices', function(){ loadNotices(); });
            $(document).off('click.annDetail').on('click.annDetail', '.btn-notice-detail', function(){ showNoticeDetail($(this).data('id')); });
            $(document).off('click.annCloseDrawer').on('click.annCloseDrawer', '#closeNoticeDrawer, #noticeDrawerOverlay', function(){ closeDrawer(); });

            renderPreview();
            loadNotices();
        })();
    </script>
</div>
