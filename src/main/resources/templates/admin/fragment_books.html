<div id="fragmentBooks" class="fade-in" style="min-height: calc(100vh - 80px);">
    <div class="container-fluid py-4 px-lg-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="font-weight-bold mb-1" style="color: #1e293b;">图书管理</h3>
                <p class="text-muted small mb-0">管理图书信息、库存与借阅审核配置</p>
            </div>
            <div class="d-flex align-items-center">
                <button id="addBookBtn" class="btn btn-primary px-4 shadow-sm mr-2" style="border-radius: 10px;">
                    <i class="fas fa-plus mr-2"></i>添加图书
                </button>
                <div class="dropdown">
                    <button class="btn btn-light shadow-sm" data-toggle="dropdown" style="border-radius: 10px; width: 42px; height: 42px; padding: 0;">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                    <div class="dropdown-menu dropdown-menu-right border-0 shadow-lg" style="border-radius: 12px;">
                        <button id="deleteSelected" class="dropdown-item text-danger py-2">
                            <i class="fas fa-trash-alt mr-2"></i>删除选中
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm" style="border-radius: 16px; overflow: hidden;">
            <div class="card-header bg-white py-3 border-0">
                <div class="row align-items-center">
                    <div class="col-lg-6 mb-3 mb-lg-0">
                        <div class="text-muted small">支持按书名 / 作者搜索</div>
                    </div>
                    <div class="col-lg-6">
                        <form id="booksSearchForm" class="d-flex justify-content-lg-end">
                            <div class="search-box mr-2">
                                <i class="fas fa-search"></i>
                                <input id="booksSearch" class="form-control" placeholder="搜书名 / 作者...">
                            </div>
                            <button id="booksSearchBtn" type="button" class="btn btn-dark px-3" style="border-radius: 10px;">筛选</button>
                            <button id="booksResetBtn" type="button" class="btn btn-link text-muted">重置</button>
                        </form>
                    </div>
                </div>
                <div id="booksMessage" class="mt-2 text-muted small" style="display:none"></div>
            </div>

            <div class="table-responsive" style="max-height: 720px;">
                <table class="table custom-table mb-0" id="booksTable">
                    <thead>
                        <tr>
                            <th class="pl-4" style="width:40px"><input id="selectAllBooks" type="checkbox"></th>
                            <th style="width:80px">序号</th>
                            <th style="min-width:220px">书名</th>
                            <th style="min-width:140px">作者</th>
                            <th style="min-width:140px">分类</th>
                            <th style="width:140px">剩余库存</th>
                            <th style="width:120px">状态</th>
                            <th class="text-right pr-4" style="width:90px">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="8" class="text-center py-5 text-muted">正在加载图书列表...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card-footer bg-white border-0 py-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="text-muted small">共 <span id="booksTotalCount">0</span> 条记录</div>
                    <nav aria-label="books pagination">
                        <ul class="pagination pagination-sm mb-0" id="booksPager"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="bookModal" tabindex="-1" role="dialog" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 28px; overflow: hidden;">
          <div class="modal-header bg-success text-white border-0">
            <h5 class="modal-title" id="bookModalTitle"><i class="fas fa-edit mr-2"></i>添加图书</h5>
            <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body p-4">
            <form id="bookForm">
                <input type="hidden" id="bookId">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold">书名 <span class="text-danger">*</span></label>
                            <input id="bookName" class="form-control" required placeholder="请输入书名">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold">作者</label>
                            <input id="bookAuthor" class="form-control" placeholder="请输入作者">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold">存放位置</label>
                            <div class="input-group">
                                <input id="bookLocation" class="form-control" placeholder="如：A区-03架-4层">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-toggle="dropdown" data-boundary="viewport">快捷设置</button>
                                    <div class="dropdown-menu dropdown-menu-right p-3 shadow" style="width: 250px; border-radius: 15px;">
                                        <div class="form-row mb-2">
                                            <div class="col">
                                                <select id="locArea" class="form-control form-control-sm">
                                                    <option value="">区域</option>
                                                    <option value="A区">A区</option>
                                                    <option value="B区">B区</option>
                                                    <option value="C区">C区</option>
                                                    <option value="D区">D区</option>
                                                </select>
                                            </div>
                                            <div class="col">
                                                <select id="locShelf" class="form-control form-control-sm">
                                                    <option value="">架</option>
                                                    <option value="01架">01架</option>
                                                    <option value="02架">02架</option>
                                                    <option value="03架">03架</option>
                                                    <option value="04架">04架</option>
                                                    <option value="05架">05架</option>
                                                </select>
                                            </div>
                                            <div class="col">
                                                <select id="locLayer" class="form-control form-control-sm">
                                                    <option value="">层</option>
                                                    <option value="1层">1层</option>
                                                    <option value="2层">2层</option>
                                                    <option value="3层">3层</option>
                                                    <option value="4层">4层</option>
                                                    <option value="5层">5层</option>
                                                </select>
                                            </div>
                                        </div>
                                        <button type="button" id="applyLocation" class="btn btn-sm btn-primary btn-block">确定</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold">出版社</label>
                            <input id="bookPublish" class="form-control" placeholder="请输入出版社">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="font-weight-bold">价格</label>
                            <input id="bookPrice" type="number" step="0.01" class="form-control" placeholder="0.00">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="font-weight-bold">出版日期</label>
                            <input id="bookPublishDate" type="date" class="form-control">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="font-weight-bold">语言</label>
                            <input id="bookLanguage" class="form-control" placeholder="如：中文">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="font-weight-bold">分类</label>
                            <select id="bookType" class="form-control"></select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="font-weight-bold">总库存</label>
                            <input id="bookStock" type="number" min="0" class="form-control" value="0">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="font-weight-bold">状态</label>
                            <select id="bookStatus" class="form-control">
                                <option value="0">在库</option>
                                <option value="1">借出</option>
                                <option value="2">禁用</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="font-weight-bold">简介</label>
                    <textarea id="bookIntroduction" class="form-control" rows="3" placeholder="请输入图书简介..."></textarea>
                </div>
                <div class="form-group">
                    <div class="custom-control custom-switch">
                        <input type="checkbox" class="custom-control-input" id="isReviewRequired">
                        <label class="custom-control-label font-weight-bold" for="isReviewRequired">借阅需人工审核</label>
                    </div>
                </div>
            </form>
            <div id="bookModalMsg" class="alert alert-danger py-2 mt-2" style="display:none; border-radius: 10px;"></div>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-light" data-dismiss="modal">取消</button>
            <button type="button" class="btn btn-success px-4" id="bookSaveBtn">保存图书</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="bookDetailModal" tabindex="-1" role="dialog" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 28px; overflow: hidden;">
          <div class="modal-header bg-primary text-white border-0">
            <h5 class="modal-title"><i class="fas fa-book mr-2"></i>图书详情</h5>
            <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body p-4" id="bookDetailBody">
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-light" data-dismiss="modal">关闭</button>
          </div>
        </div>
      </div>
    </div>

    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-box { position: relative; width: 320px; max-width: 52vw; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .search-box .form-control {
            padding-left: 36px; border-radius: 10px; background: #f1f5f9; border: none; font-size: 14px;
        }

        .custom-table thead th {
            background: #f8fafc; border-bottom: 1px solid #e2e8f0; color: #475569;
            font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 16px;
        }
        .custom-table tbody td { padding: 16px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; color: #334155; }
        .custom-table tbody tr:hover { background: #fcfdfe; }

        .action-btn {
            width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center;
            justify-content: center; color: #64748b; transition: all 0.2s;
        }
        .action-btn:hover { background: #f1f5f9; color: #1e293b; text-decoration: none; }
    </style>

    <script>
        (function(){
            var $root = $('#fragmentBooks');
            var $table = $root.find('#booksTable');
            var $tbody = $table.find('tbody');
            var $pager = $root.find('#booksPager');
            var $msg = $root.find('#booksMessage');
            var pageSize = 10, currentPage = 1, totalCount = 0, totalPages = 0;
            var currentKeyword = '';

            function statusToLabel(s){
                if(s === null || s === undefined) return '-';
                var n = parseInt(s);
                if(n===0) return '在库';
                if(n===1) return '借出';
                if(n===2) return '禁用';
                return String(s);
            }

            function showMsg(text, isError){
                $msg.text(text).css('color', isError? '#c00':'#666').show();
            }

            function renderPager(){
                totalPages = Math.max(1, Math.ceil((totalCount||0)/pageSize));
                $pager.empty();
                var start = Math.max(1, currentPage - 2);
                var end = Math.min(totalPages, start + 4);
                if(currentPage > 1){
                    $pager.append('<li class="page-item"><a class="page-link" href="#" data-page="'+(currentPage-1)+'">上一页</a></li>');
                }
                for(var p=start;p<=end;p++){
                    $pager.append('<li class="page-item '+(p===currentPage? 'active':'')+'"><a class="page-link" href="#" data-page="'+p+'">'+p+'</a></li>');
                }
                if(currentPage < totalPages){
                    $pager.append('<li class="page-item"><a class="page-link" href="#" data-page="'+(currentPage+1)+'">下一页</a></li>');
                }
            }

            function renderBooks(page){
                page = page || 1; currentPage = page;
                $tbody.html('<tr><td colspan="8" class="text-center py-5 text-muted">正在加载...</td></tr>');
                $msg.hide();
                if(currentKeyword && currentKeyword.trim()!==''){
                    $.get('/api/book/search', {keyword: currentKeyword.trim(), page: page, limit: pageSize}).done(handleResp).fail(function(){
                        $tbody.html('<tr><td colspan="8" class="text-center py-5 text-muted">加载失败</td></tr>');
                        showMsg('请求失败，请重试', true);
                    });
                } else {
                    $.get('/api/book/list', {page: page, limit: pageSize}).done(handleResp).fail(function(){
                        $tbody.html('<tr><td colspan="8" class="text-center py-5 text-muted">加载失败</td></tr>');
                        showMsg('请求失败，请重试', true);
                    });
                }
            }

            function handleResp(resp){
                if(!resp){
                    $tbody.html('<tr><td colspan="8" class="text-center py-5 text-muted">无响应</td></tr>');
                    return;
                }
                if(resp.code !== 0){
                    $tbody.html('<tr><td colspan="8" class="text-center py-5 text-muted">'+(resp.msg||'请求失败')+'</td></tr>');
                    showMsg(resp.msg||'请求错误', true);
                    return;
                }
                totalCount = resp.count || 0;
                $root.find('#booksTotalCount').text(totalCount);
                var rows = resp.data || [];
                if(!rows || rows.length===0){
                    $tbody.html('<tr><td colspan="8" class="text-center py-5 text-muted">暂无数据</td></tr>');
                    renderPager();
                    return;
                }

                var html = '';
                for(var i=0;i<rows.length;i++){
                    var r = rows[i];
                    var available = (r.stock || 0) - (r.borrowCount || 0);
                    var availableHtml = '<span class="badge ' + (available > 0 ? 'badge-success' : 'badge-danger') + '">' + available + ' / ' + (r.stock || 0) + '</span>';
                    var seq = (currentPage - 1) * pageSize + i + 1;
                    
                    html += '<tr>'+
                        '<td><input class="rowCheck" type="checkbox" data-id="'+(r.id||'')+'"></td>'+
                        '<td>'+seq+'</td>'+
                        '<td>'+(r.name||r.bookName||'')+'</td>'+
                        '<td>'+(r.author||'')+'</td>'+
                        '<td>'+((r.typeName) || (r.typeId ? (typesMap[String(r.typeId)]||'') : '') || '')+'</td>'+
                        '<td>'+availableHtml+'</td>'+
                        '<td>'+(statusToLabel(r.status))+'</td>'+
                        '<td class="text-right pr-4">'+
                            '<div class="dropdown">'+
                                '<a class="action-btn" href="#" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">'+
                                    '<i class="fas fa-ellipsis-h"></i>'+
                                '</a>'+
                                '<div class="dropdown-menu dropdown-menu-right border-0 shadow-lg py-2" style="border-radius: 12px;">'+
                                    '<button class="dropdown-item py-2 btn-detail" data-id="'+(r.id||'')+'"><i class="far fa-list-alt mr-2"></i>详情</button>'+
                                    '<button class="dropdown-item py-2 btn-edit" data-id="'+(r.id||'')+'"><i class="far fa-edit mr-2"></i>编辑</button>'+
                                    '<div class="dropdown-divider"></div>'+
                                    '<button class="dropdown-item py-2 text-danger btn-del" data-id="'+(r.id||'')+'"><i class="far fa-trash-alt mr-2"></i>删除</button>'+
                                '</div>'+
                            '</div>'+
                        '</td>'+
                        '</tr>';
                }
                $tbody.html(html);
                renderPager();
            }

            function showBookDetail(id) {
                $.get('/api/book/'+id).done(function(resp){
                    if(!resp || resp.code!==0 || !resp.data) return window.ui.toast('无法获取图书详情', 'danger');
                    var b = resp.data;
                    var typeName = b.typeName || (b.typeId ? (typesMap[String(b.typeId)]||'未知') : '未知');
                    var statusText = statusToLabel(b.status);
                    var pubDate = b.publishDate ? new Date(b.publishDate).toLocaleDateString() : '-';
                    
                    var html = `
                        <div class="row">
                            <div class="col-md-6"><p><strong>书名:</strong> ${b.name || ''}</p></div>
                            <div class="col-md-6"><p><strong>作者:</strong> ${b.author || ''}</p></div>
                        </div>
                        <div class="row">
                            <div class="col-md-6"><p><strong>存放位置:</strong> ${b.location || '-'}</p></div>
                            <div class="col-md-6"><p><strong>出版社:</strong> ${b.publish || '-'}</p></div>
                        </div>
                        <div class="row">
                            <div class="col-md-4"><p><strong>分类:</strong> ${typeName}</p></div>
                            <div class="col-md-4"><p><strong>价格:</strong> ${b.price || '-'}</p></div>
                            <div class="col-md-4"><p><strong>出版日期:</strong> ${pubDate}</p></div>
                        </div>
                        <div class="row">
                            <div class="col-md-4"><p><strong>语言:</strong> ${b.language || '-'}</p></div>
                            <div class="col-md-4"><p><strong>库存:</strong> ${b.stock || 0}</p></div>
                            <div class="col-md-4"><p><strong>已借出:</strong> ${b.borrowCount || 0}</p></div>
                        </div>
                        <div class="row">
                            <div class="col-md-6"><p><strong>状态:</strong> ${statusText}</p></div>
                            <div class="col-md-6"><p><strong>需要审核:</strong> ${b.isReviewRequired === 1 ? '是' : '否'}</p></div>
                        </div>
                        <hr>
                        <div><p><strong>简介:</strong></p><p class="text-muted">${b.introduction || '暂无简介'}</p></div>
                    `;
                    $('#bookDetailBody').html(html);
                    $('#bookDetailModal').modal('show');
                }).fail(function(){ window.ui.toast('获取详情失败', 'danger'); });
            }

            var typesMap = {};
            function loadTypes($select, callback){
                $.get('/api/type/list').done(function(resp){
                    if(resp && resp.code===0 && resp.data){
                        var opts = resp.data;
                        typesMap = {};
                        opts.forEach(function(t){ typesMap[String(t.id)] = (t.typeName||t.name||String(t.id)); });
                        if($select && $select.length){
                            $select.empty();
                            opts.forEach(function(t){ $select.append('<option value="'+t.id+'">'+(t.typeName||t.name||t.id)+'</option>'); });
                        }
                        if(callback) callback();
                    }
                });
            }

            $root.off('click', '#booksSearchBtn').on('click', '#booksSearchBtn', function(){ currentKeyword = $root.find('#booksSearch').val(); renderBooks(1); });
            $root.off('click', '#booksResetBtn').on('click', '#booksResetBtn', function(){ 
                $root.find('#booksSearch').val(''); 
                currentKeyword = ''; 
                renderBooks(1); 
            });
            $root.off('keypress', '#booksSearch').on('keypress', '#booksSearch', function(e){ if(e.which===13){ currentKeyword = $(this).val(); renderBooks(1); } });
            $root.off('click', '#booksPager a').on('click', '#booksPager a', function(e){ e.preventDefault(); var p = parseInt($(this).data('page')); if(p) renderBooks(p); });

            $root.off('change', '#selectAllBooks').on('change', '#selectAllBooks', function(){ $root.find('.rowCheck').prop('checked', $(this).prop('checked')); });

            $root.off('click', '.btn-detail').on('click', '.btn-detail', function(){
                var id = $(this).data('id');
                showBookDetail(id);
            });

            $root.off('click', '.dropdown-menu').on('click', '.dropdown-menu', function(e){
                e.stopPropagation();
            });

            $root.off('click', '#applyLocation').on('click', '#applyLocation', function(e){
                var area = $('#locArea').val();
                var shelf = $('#locShelf').val();
                var layer = $('#locLayer').val();
                if(!area || !shelf || !layer) return window.ui.toast('请选择完整的区域、货架和层级', 'warning');
                $('#bookLocation').val(area + '-' + shelf + '-' + layer);
                $(this).closest('.dropdown-menu').prev('.dropdown-toggle').dropdown('toggle');
            });

            $root.off('click', '#deleteSelected').on('click', '#deleteSelected', async function(){
                var ids = $root.find('.rowCheck:checked').map(function(){ return $(this).data('id'); }).get();
                if(ids.length===0) return window.ui.toast('请选择要删除的图书', 'warning');
                var ok = await window.ui.confirm('确认删除选中图书？', '删除图书');
                if(!ok) return;
                $.ajax({url:'/api/book/deleteBatch', method:'POST', contentType:'application/json', data: JSON.stringify(ids)}).done(function(resp){
                    if(resp && resp.code===0){ 
                        $root.find('#selectAllBooks').prop('checked', false);
                        renderBooks(currentPage); 
                    } else { window.ui.toast('删除失败: ' + ((resp && resp.msg) || ''), 'danger'); }
                }).fail(function(){ window.ui.toast('删除请求失败', 'danger'); });
            });

            $root.off('click', '.btn-del').on('click', '.btn-del', async function(){
                var id = $(this).data('id');
                var ok = await window.ui.confirm('确认删除该图书？', '删除图书');
                if(!ok) return;
                $.ajax({url:'/api/book/'+id, method:'DELETE'}).done(function(resp){
                    if(resp && resp.code===0){ 
                        window.ui.toast('删除成功', 'success');
                        renderBooks(currentPage); 
                    } else { window.ui.toast('删除失败: ' + ((resp && resp.msg) || ''), 'danger'); }
                }).fail(function(){ window.ui.toast('删除失败', 'danger'); });
            });

            $root.off('click', '#addBookBtn').on('click', '#addBookBtn', function(){
                $('#bookModalTitle').text('添加图书');
                $('#bookForm')[0].reset(); 
                $('#bookId').val(''); 
                $('#bookIntroduction').val('');
                $('#bookModalMsg').hide();
                loadTypes($('#bookType'));
                $('#bookModal').modal('show');
            });

            $root.off('click', '.btn-edit').on('click', '.btn-edit', function(){
                var id = $(this).data('id');
                $.get('/api/book/'+id).done(function(resp){
                    if(!resp || resp.code!==0 || !resp.data) return window.ui.toast('无法获取图书详情', 'danger');
                    var b = resp.data;
                    $('#bookModalTitle').text('编辑图书');
                    $('#bookId').val(b.id || '');
                    $('#bookName').val(b.name || b.bookName || '');
                    $('#bookAuthor').val(b.author || '');
                    $('#bookLocation').val(b.location || '');
                    $('#bookPublish').val(b.publish || '');
                    $('#bookPrice').val(b.price || '');
                    $('#bookLanguage').val(b.language || '');
                    $('#bookStock').val(b.stock || 0);
                    $('#bookIntroduction').val(b.introduction || '');
                    
                    if(b.publishDate) {
                        var d = new Date(b.publishDate);
                        var dateStr = d.toISOString().split('T')[0];
                        $('#bookPublishDate').val(dateStr);
                    } else {
                        $('#bookPublishDate').val('');
                    }

                    loadTypes($('#bookType'), function(){ $('#bookType').val(b.typeId || b.type || ''); });
                    $('#bookStatus').val((b.status !== undefined && b.status !== null) ? String(b.status) : '0');
                    $('#isReviewRequired').prop('checked', b.isReviewRequired === 1);
                    $('#bookModalMsg').hide();
                    $('#bookModal').modal('show');
                }).fail(function(){ window.ui.toast('获取图书信息失败', 'danger'); });
            });

            $root.off('click', '#bookSaveBtn').on('click', '#bookSaveBtn', function(){
                var id = $('#bookId').val();
                var payload = {
                    name: $('#bookName').val(),
                    author: $('#bookAuthor').val(),
                    location: $('#bookLocation').val(),
                    publish: $('#bookPublish').val(),
                    price: $('#bookPrice').val() ? parseFloat($('#bookPrice').val()) : null,
                    publishDate: $('#bookPublishDate').val() || null,
                    language: $('#bookLanguage').val(),
                    stock: parseInt($('#bookStock').val() || 0),
                    introduction: $('#bookIntroduction').val(),
                    status: parseInt($('#bookStatus').val()),
                    isReviewRequired: $('#isReviewRequired').is(':checked') ? 1 : 0
                };
                var typeVal = $('#bookType').val(); if(typeVal) payload.typeId = typeVal;
                if(!payload.name || payload.name.trim()===''){ $('#bookModalMsg').text('书名不能为空').show(); return; }
                if(id){ payload.id = id; $.ajax({url:'/api/book/update', method:'POST', contentType:'application/json', data: JSON.stringify(payload)}).done(function(resp){
                    if(resp && resp.code===0){ $('#bookModal').modal('hide'); renderBooks(currentPage); } else { $('#bookModalMsg').text(resp && resp.msg || '保存失败').show(); }
                }).fail(function(){ $('#bookModalMsg').text('请求失败').show(); }); }
                else { $.ajax({url:'/api/book/add', method:'POST', contentType:'application/json', data: JSON.stringify(payload)}).done(function(resp){
                    if(resp && resp.code===0){ $('#bookModal').modal('hide'); renderBooks(1); } else { $('#bookModalMsg').text(resp && resp.msg || '保存失败').show(); }
                }).fail(function(){ $('#bookModalMsg').text('请求失败').show(); }); }
            });

            loadTypes(null, function(){ renderBooks(1); });
        })();
    </script>
</div>
